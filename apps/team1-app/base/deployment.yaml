apiVersion: apps/v1
kind: Deployment
metadata:
  name: team1-app
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: team1-app
  template:
    metadata:
      labels:
        app: team1-app
    spec:
      containers:
        - name: team1-app
          image: 495599735720.dkr.ecr.ap-northeast-2.amazonaws.com/team1-app:latest
          ports:
            - containerPort: 8080
            - containerPort: 8081
          env:
            - name: TZ
              value: "Asia/Seoul"
            - name: SPRING_PROFILES_ACTIVE
              value: "dev"
            - name: DB_URL
              value: "jdbc:mysql://team1-rds-primary.cne4w2cys26c.ap-northeast-2.rds.amazonaws.com:3306/course_registration"
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: team1-secret
                  key: db-username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: team1-secret
                  key: db-password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: team1-secret
                  key: jwt-secret
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
