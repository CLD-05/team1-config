apiVersion: apps/v1
kind: Deployment
metadata:
  name: team1-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: team1-app
  template:
    metadata:
      labels:
        app: team1-app
    spec:
      containers:
        - name: team1-app
          image: 495599735720.dkr.ecr.ap-northeast-2.amazonaws.com/team1-course-service:1.0
          ports:
            - containerPort: 8080 
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "dev"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"